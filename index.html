<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iNFORMA ☬SHΞN™</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.puter.com/v2/"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Vazirmatn', sans-serif; background-color: #000; color: #c9d1d9; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        main { flex-grow: 1; position: relative; z-index: 1; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .animated-gradient-text { background: linear-gradient(45deg, #ff4800, #ff8d00, #ffea00, #ff8d00, #ff4800); background-size: 400% 400%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: gradient-wave 5s ease infinite; }
        @keyframes gradient-wave { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .gradient-black-gray { background: linear-gradient(to right, #a0a0a0, #444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .shen-card { background-color: rgba(17,17,17,0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,141,0,0.5); border-radius: 1.5rem; box-shadow: 0 0 20px rgba(255,141,0,0.15); transition: all 0.3s ease; }
        .shen-input { width: 100%; background-color: #0a0a0a; border: 1px solid #444; border-radius: 0.75rem; padding: 1rem; font-size: 1.125rem; outline: none; transition: all 0.3s ease; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); color: #c9d1d9; direction: rtl; text-align: right; font-family: 'Vazirmatn', sans-serif; }
        .shen-input:focus { border-color: #ff8d00; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5), 0 0 0 3px rgba(255,141,0,0.4); }
        .shen-input::placeholder { color: #666; font-weight: 300; text-align: right; }
        textarea.shen-input { resize: none; }
        .mode-btn.active, .training-type-btn.active { background-color: #ff8d00; color: #000; font-weight: 700; box-shadow: 0 0 15px rgba(255,141,0,0.5); }
        .mode-btn, .training-type-btn { border: 1px solid #444; }
        .chat-bubble { animation: slide-up 0.5s ease-out forwards; max-width: 95%; }
        @keyframes slide-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .user-bubble { align-self: flex-end; }
        .ai-bubble { align-self: flex-start; }
        .shen-logo { width: 2.5rem; height: 2.5rem; background-color: rgba(255,141,0,0.1); border-radius: 9999px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: bold; color: #ff8d00; border: 1px solid rgba(255,141,0,0.3); flex-shrink: 0; }
        #loading-indicator { min-height: 4rem; display: flex; align-items: center; justify-content: center; }
        #loading-indicator.hidden { display: none; }
        .loading-gradient-wave { font-family: monospace; white-space: nowrap; background: linear-gradient(90deg, #ff4800, #ff8d00, #ffea00, #ff8d00, #ff4800); background-size: 300% 100%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: loading-gradient-animation 2.5s infinite linear; }
        @keyframes loading-gradient-animation { 0% { background-position: 150% 50%; } 100% { background-position: -50% 50%; } }
        .code-block pre { user-select: text; -webkit-user-select: text; }
        #background-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; }
        .auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); backdrop-filter: blur(12px); z-index: 2000; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 1.5rem; transition: opacity 0.3s; }
        .auth-card { background: #0f0f0f; border: 1px solid #ff8d00; border-radius: 2rem; padding: 2.5rem 2rem; text-align: center; max-width: 320px; width: 90%; box-shadow: 0 0 40px rgba(255,141,0,0.3); }
        .shen-brand-ltr { direction: ltr; display: inline-block; unicode-bidi: embed; }
        .connect-btn { background: linear-gradient(45deg, #ff4800, #ff8d00); color: #000; font-weight: bold; padding: 0.8rem 1.5rem; border-radius: 2rem; margin-top: 1.5rem; cursor: pointer; transition: all 0.3s; border: none; width: 100%; font-size: 1.1rem; }
        .connect-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,141,0,0.4); }
        .connect-btn:active { transform: scale(0.95); }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .cursor { animation: blink 0.8s infinite; }
        .confirm-checkbox:checked { background-color: #ff8d00; border-color: #ff8d00; background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='black' xmlns='http://www.w3.org/2000/svg'%3e%3cpath d='M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z'/%3e%3c/svg%3e"); }
    </style>
</head>
<body class="pt-8 sm:pt-16">
    <canvas id="background-canvas"></canvas>
    
    <!-- لایه احراز هویت اصلاح شده با کلیک کاربر برای جلوگیری از بلاک شدن پاپ‌آپ -->
    <div id="auth-overlay" class="auth-overlay">
        <div class="auth-card">
            <div class="text-orange-500 text-3xl mb-4 font-orbitron shen-brand-ltr font-black">☬SHΞN™</div>
            <div class="text-sm text-gray-300 mb-2">برای ورود به لابراتوار نیاز به اتصال به هسته مرکزی دارید.</div>
            <div id="auth-status-container" class="hidden mt-4">
                <div class="loading-gradient-wave text-xs" id="auth-status">در حال ارتباط با سرور...</div>
            </div>
            <div id="auth-error-msg" class="text-red-400 text-xs mt-3 hidden"></div>
            <button id="auth-connect-btn" class="connect-btn">اتصال و احراز هویت</button>
        </div>
    </div>

    <div class="flex flex-col min-h-screen">
        <main class="container mx-auto px-4 w-full flex-grow">
            <!-- صفحه اصلی -->
            <div id="initial-view" class="view max-w-3xl mx-auto">
                <div class="text-center mb-12">
                    <h1 class="text-3xl sm:text-4xl md:text-5xl font-black font-orbitron tracking-wide sm:tracking-wider">
                        <span class="gradient-black-gray">iNFORMA</span>
                        <span class="animated-gradient-text shen-brand-ltr">☬SHΞN™</span>
                    </h1>
                    <p class="text-sm md:text-base text-gray-300 mt-3">اولین لابراتوار دانشگاهی هسته مستقل شین</p>
                </div>
                
                <div class="shen-card p-6 md:p-8">
                    <div class="w-full bg-black/20 rounded-full p-1.5 flex flex-row items-center justify-between font-bold mb-8 shadow-inner">
                        <button data-mode="آموزش" class="mode-btn flex-1 py-2 rounded-full text-center transition-all duration-300 text-xs sm:text-sm md:text-base">یادم بده</button>
                        <button data-mode="تشریح مشکل" class="mode-btn flex-1 py-2 rounded-full text-center transition-all duration-300 text-xs sm:text-sm md:text-base active">مشکل خوردم</button>
                        <button data-mode="تحلیل خطا" class="mode-btn flex-1 py-2 rounded-full text-center transition-all duration-300 text-xs sm:text-sm md:text-base">خطا چیه؟</button>
                    </div>
                    
                    <div id="input-area" class="space-y-6"></div>
                    
                    <div class="text-center mt-8">
                        <button id="start-btn" class="bg-gradient-to-br from-[#ff4800] to-[#ff8d00] text-black font-bold py-3 px-12 rounded-full text-lg hover:from-[#ff8d00] hover:to-[#ffea00] transition-all duration-300 transform hover:scale-105 shadow-lg shadow-orange-500/30">
                            بریـم بـراش
                        </button>
                    </div>
                </div>
            </div>

            <!-- محیط چت -->
            <div id="chat-view" class="view hidden max-w-3xl mx-auto flex flex-col h-full">
                <div id="menu-container" class="fixed top-5 right-5 z-20">
                    <button id="menu-toggle" class="w-12 h-12 rounded-full bg-gray-900/80 border border-orange-500/50 backdrop-blur-sm text-orange-400 flex items-center justify-center shadow-lg transform hover:scale-110 transition-all">
                        <i data-lucide="menu"></i>
                    </button>
                    <div id="floating-menu" class="absolute top-14 right-0 bg-black/80 border border-orange-500/50 backdrop-blur-md rounded-lg shadow-xl p-2 space-y-1 origin-top-right transition-all duration-200 transform scale-95 opacity-0 pointer-events-none w-64">
                        <button id="home-btn" class="w-full flex items-center space-x-2 space-x-reverse p-2 rounded-md hover:bg-orange-500/10 transition-colors text-right text-orange-300">
                            <i data-lucide="home" class="w-5 h-5 shrink-0"></i>
                            <span class="text-sm">بزنی با خاطراتت سوت میشی صفحه اول</span>
                        </button>
                    </div>
                </div>
                
                <div class="text-center pt-4 pb-8">
                    <h2 class="text-xl font-bold text-orange-400" id="chat-title">تشریح مشکل</h2>
                    <p class="text-sm text-gray-400 mt-1">لابراتوار تحلیل متصل شد به <span class="shen-brand-ltr">☬SHΞN™ core</span></p>
                </div>
                
                <div id="chat-container" class="flex flex-col space-y-6 px-1 pb-10"></div>
                
                <div id="loading-indicator" class="hidden text-center py-4">
                    <div class="loading-gradient-wave text-sm font-semibold tracking-widest shen-brand-ltr">
                        [ ☬SHΞN™ core thinking... ]
                    </div>
                </div>
            </div>
        </main>

        <footer class="py-6 text-center text-sm relative z-10">
            <p class="animated-gradient-text font-semibold">Exclusive <span class="shen-brand-ltr">☬SHΞN™</span> made</p>
        </footer>
    </div>

    <!-- قالب‌های داینامیک -->
    <template id="template-آموزش">
        <div class="space-y-6">
            <input type="text" id="topic" class="shen-input" placeholder="محتوا مثال: طراحی وب">
            <div class="flex items-center bg-black/20 rounded-full p-2 space-x-2 space-x-reverse">
                <button data-value="شروع کلی" class="training-type-btn flex-1 p-3 rounded-md font-semibold text-xs sm:text-sm transition-colors active">آموزش کلی</button>
                <button data-value="مقطعی" class="training-type-btn flex-1 p-3 rounded-md font-semibold text-xs sm:text-sm transition-colors">مبحث مشخص</button>
            </div>
            <div id="sub-topic-container" class="hidden">
                <input type="text" id="sub-topic" class="shen-input" placeholder="کدوم بخش؟ مثلا: HTML">
            </div>
        </div>
    </template>
    
    <template id="template-تشریح-مشکل">
        <textarea id="problem-desc" class="shen-input h-48" placeholder="مشکل خود را به زبان ساده و با جزییات کامل اینجا بنویسید..."></textarea>
    </template>
    
    <template id="template-تحلیل-خطا">
        <div class="space-y-6">
            <input type="text" id="error-source" class="shen-input" placeholder="محل خطا مثال: ترمینال">
            <textarea id="error-text" class="shen-input h-48" placeholder="متن کامل خطا را اینجا کپی کنید..."></textarea>
        </div>
    </template>

    <script>
        (function() {
            lucide.createIcons();

            const modeBtns = document.querySelectorAll('.mode-btn');
            const inputArea = document.getElementById('input-area');
            const startBtn = document.getElementById('start-btn');
            const initialView = document.getElementById('initial-view');
            const chatView = document.getElementById('chat-view');
            const chatContainer = document.getElementById('chat-container');
            const loadingIndicator = document.getElementById('loading-indicator');
            const chatTitle = document.getElementById('chat-title');
            const menuToggle = document.getElementById('menu-toggle');
            const floatingMenu = document.getElementById('floating-menu');
            const homeBtn = document.getElementById('home-btn');
            const authOverlay = document.getElementById('auth-overlay');
            const authStatusContainer = document.getElementById('auth-status-container');
            const authErrorMsg = document.getElementById('auth-error-msg');
            const authConnectBtn = document.getElementById('auth-connect-btn');

            let currentMode = 'تشریح مشکل';
            let isChatReady = false;
            let isLoading = false;
            let messages = [];

            const SYSTEM_INSTRUCTION = `تو یک دستیار هوشمند، حرفه‌ای و هکر استایل به نام '☬SHΞN™ learner' هستی. پردازش‌های تو در '☬SHΞN™ core' انجام می‌شود.
- لحن تو باید مستقیم، تخصصی، و بدون مقدمه و احوال‌پرسی باشد.
- فقط به زبان فارسی روان صحبت کن. اصطلاحات تخصصی شبکه، سرور و کدنویسی را به انگلیسی بنویس.
- هرگز از کاراکترهای ژاپنی یا چینی استفاده نکن.
- پاسخ‌هایت را قدم‌به‌قدم بده و همه‌چیز را یکجا ننویس.

⚠️ بسیار مهم (نحوه تعامل):
تو باید در انتهای هر پیام خود، حتماً یکی از تگ‌های زیر را برای دریافت پاسخ از کاربر قرار دهی:
1. اگر نیاز به گرفتن توضیح، دستور یا کدی از سمت کاربر داری: [INPUT:راهنمای کادر متنی]
2. اگر سوال بله/خیر می‌پرسی: [YESNO:متن سوال]
3. اگر چند گزینه می‌دهی: [CHOICE:گزینه۱|گزینه۲|گزینه۳]
4. اگر آموزش دادی و منتظر تایید انجام آن هستی: [CHECKBOX]
`.trim();

            function addUserMessageToUI(text) {
                const wrapper = document.createElement('div');
                wrapper.className = 'flex items-start gap-3 chat-bubble user-bubble justify-end mb-6';
                wrapper.innerHTML = `
                    <div class="shen-card p-4 shadow-md order-1 bg-orange-950/20 border-orange-500/30 text-orange-50 max-w-[85%] sm:max-w-xl">
                        ${text.replace(/\n/g, '<br>')}
                    </div>
                    <div class="w-10 h-10 bg-slate-800 rounded-full flex items-center justify-center order-2 shrink-0 border border-orange-500/50 shadow-[0_0_10px_rgba(255,141,0,0.2)]">
                        <i data-lucide="user" class="text-orange-400 w-5 h-5"></i>
                    </div>`;
                chatContainer.appendChild(wrapper);
                lucide.createIcons();
                window.scrollTo(0, document.body.scrollHeight);
            }

            async function streamPuterResponse(userPrompt, onChunk, onComplete) {
                messages.push({ role: "user", content: userPrompt });
                try {
                    // اتصال ساده بدون تعیین مدل ثابت برای جلوگیری از کرش
                    const response = await puter.ai.chat(messages, { stream: true });
                    let full = "";
                    for await (const part of response) {
                        const chunk = part?.text || "";
                        full += chunk;
                        onChunk(full);
                    }
                    messages.push({ role: "assistant", content: full });
                    onComplete(full);
                } catch(err) {
                    console.error(err);
                    onComplete(null, err.message || "خطا در ارتباط با سرور");
                }
            }

            async function getAIResponseAndDisplay(prompt) {
                if(isLoading) return;
                isLoading = true;
                loadingIndicator.classList.remove('hidden');
                
                const aiDiv = document.createElement('div');
                aiDiv.className = 'flex items-start gap-3 chat-bubble ai-bubble w-full mb-8';
                
                const logo = document.createElement('div');
                logo.className = 'shen-logo order-1 shadow-[0_0_15px_rgba(255,141,0,0.3)] mt-1 shen-brand-ltr';
                logo.innerHTML = '<span class="text-lg">☬</span>';
                
                const contentDiv = document.createElement('div');
                contentDiv.className = 'shen-card p-5 shadow-md order-2 w-full max-w-[90%] sm:max-w-2xl leading-relaxed text-gray-200';
                
                const cursor = document.createElement('span');
                cursor.className = 'cursor inline-block w-[2px] h-[1.2em] bg-orange-500 ml-1 align-middle';
                
                contentDiv.appendChild(cursor);
                aiDiv.appendChild(logo);
                aiDiv.appendChild(contentDiv);
                chatContainer.appendChild(aiDiv);
                
                window.scrollTo(0, document.body.scrollHeight);

                let accumulated = "";
                await streamPuterResponse(prompt,
                    (partial) => {
                        accumulated = partial;
                        contentDiv.innerText = accumulated;
                        contentDiv.appendChild(cursor);
                        window.scrollTo(0, document.body.scrollHeight);
                    },
                    (final, error) => {
                        loadingIndicator.classList.add('hidden');
                        cursor.remove();
                        if(error) {
                            contentDiv.innerHTML = `<span class="text-red-400 font-bold">⚠️ خطا: ${error}</span>`;
                        } else {
                            contentDiv.innerHTML = formatResponse(final);
                            setupInteractiveElements(contentDiv);
                        }
                        isLoading = false;
                        lucide.createIcons();
                        window.scrollTo(0, document.body.scrollHeight);
                    }
                );
            }

            function formatResponse(text) {
                let interactiveHtml = '';
                let mainText = text;
                
                const yesNo = text.match(/\[YESNO:(.*?)\]/);
                const choice = text.match(/\[CHOICE:(.*?)\]/);
                const input = text.match(/\[INPUT:(.*?)\]/);
                const checkbox = text.match(/\[CHECKBOX\]/);

                if(yesNo) mainText = mainText.replace(yesNo[0], `<p class="mt-5 font-bold text-orange-400 text-lg border-r-4 border-orange-500 pr-3">${yesNo[1]}</p>`).trim();
                else if(choice) mainText = mainText.replace(choice[0], '').trim();
                else if(input) mainText = mainText.replace(input[0], '').trim();
                else if(checkbox) mainText = mainText.replace(checkbox[0], '').trim();

                interactiveHtml += '<div class="interactive-active mt-5">';
                
                if(yesNo) {
                    interactiveHtml += `
                        <div class="flex flex-wrap gap-4">
                            <button class="choice-btn flex-1 border border-orange-500/50 bg-orange-500/20 text-orange-300 hover:bg-orange-500 hover:text-black py-3 rounded-xl transition-all duration-300 font-bold shadow-lg shadow-orange-500/10">بله</button>
                            <button class="choice-btn flex-1 border border-gray-600/50 bg-gray-800 text-gray-300 hover:bg-gray-700 hover:text-white py-3 rounded-xl transition-all duration-300 font-bold shadow-lg">خیر</button>
                        </div>`;
                } else if(choice) {
                    const options = choice[1].split('|').map(o => o.trim());
                    interactiveHtml += `<div class="flex flex-col sm:flex-row flex-wrap gap-3">
                        ${options.map(opt => `<button class="choice-btn border border-orange-500/30 bg-black/40 text-orange-200 hover:bg-orange-500 hover:text-black hover:border-orange-500 px-5 py-3 rounded-xl transition-all duration-300 font-semibold shadow-sm">${opt}</button>`).join('')}
                    </div>`;
                } else if(checkbox) {
                    interactiveHtml += `
                        <div class="pt-4 border-t border-white/10">
                            <label class="flex items-center cursor-pointer group w-fit">
                                <input type="checkbox" class="confirm-checkbox w-6 h-6 ml-3 rounded-md border-2 border-orange-500/70 bg-black/50 appearance-none checked:bg-orange-500 checked:border-orange-500 transition-all cursor-pointer">
                                <span class="text-base sm:text-lg font-semibold text-gray-300 group-hover:text-white transition-colors select-none">انجام دادم، بریم مرحله بعد.</span>
                            </label>
                        </div>`;
                } else {
                    const placeholderText = input ? input[1] : "پاسخ یا کد خود را اینجا بنویسید...";
                    interactiveHtml += `
                        <form class="input-form flex flex-col gap-3">
                            <textarea placeholder="${placeholderText}" class="shen-input h-28 text-sm sm:text-base focus:bg-black/80"></textarea>
                            <button type="submit" class="bg-gradient-to-r from-orange-600 to-orange-400 text-black py-3 px-4 rounded-xl font-bold w-full transition-all duration-300 hover:shadow-[0_0_20px_rgba(255,141,0,0.4)] text-base sm:text-lg flex items-center justify-center gap-2">
                                <i data-lucide="send" class="w-5 h-5"></i>
                                ارسال پاسخ
                            </button>
                        </form>`;
                }
                interactiveHtml += '</div>';

                let html = mainText
                    .replace(/```(\w+)?\n([\s\S]*?)
```/g, (m, lang, code) => {
                        const language = lang || 'text';
                        return `
                        <div class="code-block my-5 rounded-xl bg-[#0d1117] overflow-hidden border border-gray-800 shadow-xl" dir="ltr">
                            <div class="flex items-center justify-between bg-[#161b22] px-4 py-2 border-b border-gray-800">
                                <span class="text-gray-400 font-mono text-xs uppercase tracking-wider">${language}</span>
                                <div class="flex space-x-2 space-x-reverse">
                                    <button class="copy-btn p-1.5 rounded-lg hover:bg-gray-700 text-gray-400 hover:text-white transition-colors" title="کپی کد"><i data-lucide="copy" class="w-4 h-4"></i></button>
                                    <button class="download-btn p-1.5 rounded-lg hover:bg-gray-700 text-gray-400 hover:text-white transition-colors" data-lang="${language}" title="دانلود فایل"><i data-lucide="download" class="w-4 h-4"></i></button>
                                </div>
                            </div>
                            <pre class="p-4 text-sm text-gray-300 overflow-x-auto font-mono leading-relaxed"><code class="language-${language}">${code.trim().replace(/</g,"&lt;").replace(/>/g,"&gt;")}</code></pre>
                        </div>`;
                    })
                    .replace(/\*\*(.*?)\*\*/g, '<strong class="text-orange-400 font-bold">$1</strong>')
                    .replace(/\*(.*?)\*/g, '<em class="italic text-gray-300">$1</em>')
                    .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank" class="text-cyan-400 hover:text-cyan-300 underline decoration-cyan-400/30 underline-offset-4 transition-colors">$1</a>')
                    .replace(/^- (.*$)/gm, '<li class="mb-2 flex items-start"><span class="text-orange-500 ml-2 mt-1 shrink-0">❖</span><span class="text-gray-200">$1</span></li>')
                    .replace(/(<li.*>[\s\S]*?<\/li>)+/g, '<ul class="list-none my-4 pr-2 space-y-1">$&</ul>')
                    .replace(/\n/g, '<br>');

                return html + interactiveHtml;
            }

            function disableAllPrevious() {
                document.querySelectorAll('.interactive-active').forEach(el => {
                    el.classList.remove('interactive-active');
                    el.style.opacity = '0.5';
                    el.style.pointerEvents = 'none';
                    el.style.filter = 'grayscale(100%)';
                    const btn = el.querySelector('button[type="submit"]');
                    if(btn) btn.style.display = 'none';
                });
            }

            function setupInteractiveElements(container) {
                container.querySelectorAll('.copy-btn').forEach(btn => btn.addEventListener('click', () => {
                    const code = btn.closest('.code-block').querySelector('code').innerText;
                    navigator.clipboard.writeText(code);
                    btn.innerHTML = '<i data-lucide="check" class="w-4 h-4 text-green-400"></i>';
                    lucide.createIcons();
                    setTimeout(() => { btn.innerHTML = '<i data-lucide="copy" class="w-4 h-4"></i>'; lucide.createIcons(); }, 2000);
                }));

                container.querySelectorAll('.download-btn').forEach(btn => btn.addEventListener('click', () => {
                    const code = btn.closest('.code-block').querySelector('code').innerText;
                    const lang = btn.dataset.lang || 'txt';
                    const blob = new Blob([code], {type: 'text/plain'});
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = `shen-code-snippet.${lang}`; a.click();
                    URL.revokeObjectURL(url);
                }));

                container.querySelectorAll('.choice-btn').forEach(btn => btn.addEventListener('click', () => {
                    disableAllPrevious();
                    const ans = btn.textContent;
                    addUserMessageToUI(ans);
                    getAIResponseAndDisplay(ans);
                }));

                const form = container.querySelector('.input-form');
                if(form) form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const ta = form.querySelector('textarea');
                    if(ta.value.trim()) {
                        disableAllPrevious();
                        addUserMessageToUI(ta.value);
                        getAIResponseAndDisplay(ta.value);
                    }
                });

                const chk = container.querySelector('.confirm-checkbox');
                if(chk) chk.addEventListener('change', (e) => {
                    if(e.target.checked) {
                        disableAllPrevious();
                        addUserMessageToUI("انجام دادم، لطفاً مرحله بعد را توضیح بده.");
                        getAIResponseAndDisplay("مرحله تایید شد. قدم بعدی چیست؟");
                    }
                });
            }

            function updateModeUI() {
                modeBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.mode === currentMode));
                inputArea.innerHTML = '';
                const tplId = `template-${currentMode.replace(/ /g, '-')}`;
                const tpl = document.getElementById(tplId);
                if(tpl) inputArea.appendChild(tpl.content.cloneNode(true));
                
                if(currentMode === 'آموزش') {
                    const subContainer = document.getElementById('sub-topic-container');
                    const btns = document.querySelectorAll('.training-type-btn');
                    btns.forEach(btn => btn.addEventListener('click', (e) => {
                        btns.forEach(b => b.classList.remove('active'));
                        e.currentTarget.classList.add('active');
                        subContainer.classList.toggle('hidden', e.currentTarget.dataset.value !== 'مقطعی');
                    }));
                }
            }

            async function handleStart() {
                if(!isChatReady) return;
                let initialPrompt = '', userMsg = '';
                const val = id => document.getElementById(id)?.value.trim() || '';
                
                if(currentMode === 'آموزش') {
                    const topic = val('topic'); if(!topic) { alert('لطفاً مبحث آموزش را مشخص کنید.'); return; }
                    const sub = val('sub-topic');
                    const type = document.querySelector('.training-type-btn.active')?.dataset.value || 'شروع کلی';
                    userMsg = `مبحث: ${topic}${type==='مقطعی' && sub ? ` | بخش: ${sub}` : ` | نوع: ${type}`}`;
                    initialPrompt = `قصد آموزش مبحث '${topic}' را دارم. نوع آموزش: '${type}'.${type==='مقطعی' ? ` بخش خاص: '${sub}'` : ''} لطفاً اولین قدم را شروع کن. در انتهای پیامت تگ مربوطه را حتما قرار دهی.`;
                } else if(currentMode === 'تشریح مشکل') {
                    const prob = val('problem-desc'); if(!prob) { alert('لطفاً مشکل خود را تشریح کنید.'); return; }
                    userMsg = prob;
                    initialPrompt = `من با این مشکل مواجه شده‌ام: '${prob}'. لطفاً برای تشخیص دقیق، اولین و مهم‌ترین سوالی که باید بپرسی را مطرح کن.`;
                } else if(currentMode === 'تحلیل خطا') {
                    const src = val('error-source');
                    const err = val('error-text'); if(!err) { alert('لطفاً متن خطا را وارد کنید.'); return; }
                    userMsg = `خطا در ${src || 'برنامه'}:\n${err}`;
                    initialPrompt = `من در '${src || 'برنامه'}' با خطای زیر مواجه شدم: \n\`\`\`\n${err}\n\`\`\`\n لطفاً به زبان ساده بگو دلیل آن چیست و قدم اول برای حل آن را پیشنهاد بده.`;
                }
                
                if(initialPrompt) {
                    chatTitle.textContent = currentMode;
                    initialView.classList.add('hidden');
                    chatView.classList.remove('hidden');
                    addUserMessageToUI(userMsg);
                    await getAIResponseAndDisplay(initialPrompt);
                }
            }

            // لاجیک جدید اتصال متکی به کلیک کاربر
            authConnectBtn.addEventListener('click', async () => {
                authConnectBtn.classList.add('hidden');
                authStatusContainer.classList.remove('hidden');
                authErrorMsg.classList.add('hidden');
                
                try {
                    // پینگ گرفتن از Puter بعد از کلیک (پاپ‌آپ توسط مرورگر مسدود نمیشه)
                    await puter.ai.chat("ping");
                    authOverlay.style.opacity = '0';
                    setTimeout(() => authOverlay.style.display = 'none', 300);
                    
                    isChatReady = true;
                    messages = [{ role: "system", content: SYSTEM_INSTRUCTION }];
                    
                    // فعال سازی UI
                    modeBtns.forEach(btn => btn.addEventListener('click', () => { currentMode = btn.dataset.mode; updateModeUI(); }));
                    startBtn.addEventListener('click', handleStart);
                    
                    menuToggle?.addEventListener('click', (e) => {
                        e.stopPropagation();
                        floatingMenu.classList.toggle('scale-95');
                        floatingMenu.classList.toggle('opacity-0');
                        floatingMenu.classList.toggle('pointer-events-none');
                    });
                    
                    homeBtn?.addEventListener('click', () => {
                        chatView.classList.add('hidden');
                        initialView.classList.remove('hidden');
                        chatContainer.innerHTML = '';
                        messages = [{ role: "system", content: SYSTEM_INSTRUCTION }];
                        isLoading = false;
                        updateModeUI();
                    });
                    
                    document.addEventListener('click', () => {
                        if(floatingMenu && !floatingMenu.classList.contains('opacity-0')) {
                            floatingMenu.classList.add('scale-95', 'opacity-0', 'pointer-events-none');
                        }
                    });
                    
                    updateModeUI();

                } catch(err) {
                    console.error(err);
                    authStatusContainer.classList.add('hidden');
                    authErrorMsg.classList.remove('hidden');
                    authErrorMsg.innerText = "ارتباط برقرار نشد! اتصال اینترنت و VPN خود را چک کنید.";
                    authConnectBtn.classList.remove('hidden');
                    authConnectBtn.innerText = "تلاش مجدد";
                }
            });

        })();

        (function() {
            const canvas = document.getElementById('background-canvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            const config = { particleCount: 70, maxVelocity: 0.6, connectionDistance: 150, particleSize: 1.5, particleColor: 'rgba(255,141,0,0.4)' };
            
            function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; createParticles(); }
            
            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.vx = (Math.random() - 0.5) * config.maxVelocity;
                    this.vy = (Math.random() - 0.5) * config.maxVelocity;
                }
                update() {
                    this.x += this.vx; this.y += this.vy;
                    if(this.x < 0 || this.x > canvas.width) this.vx *= -1;
                    if(this.y < 0 || this.y > canvas.height) this.vy *= -1;
                }
                draw() {
                    ctx.beginPath(); ctx.arc(this.x, this.y, config.particleSize, 0, Math.PI*2);
                    ctx.fillStyle = config.particleColor; ctx.fill();
                }
            }
            
            function createParticles() {
                particles = [];
                for(let i=0; i<config.particleCount; i++) particles.push(new Particle());
            }
            
            function connect() {
                for(let i=0; i<particles.length; i++) {
                    for(let j=i+1; j<particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.hypot(dx, dy);
                        if(dist < config.connectionDistance) {
                            ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(255,141,0,${0.3 * (1 - dist/config.connectionDistance)})`;
                            ctx.lineWidth = 1; ctx.stroke();
                        }
                    }
                }
            }
            
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => { p.update(); p.draw(); });
                connect();
                requestAnimationFrame(animate);
            }
            
            resize(); animate();
            window.addEventListener('resize', resize);
        })();
    </script>
</body>
</html>
